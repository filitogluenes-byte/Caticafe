<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çatı Cafe - Dijital Menü</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .kategori { background: #34495e; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .urun { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; }
        button { background: #e67e22; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>☕ Çatı Cafe Menü</h1>
    <div class="kategori">
        <h3>💨 Nargileler</h3>
        <div class="urun"><span>Anason</span> <button onclick="siparis('Anason')">Sipariş</button></div>
        <div class="urun"><span>Çatı Özel</span> <button onclick="siparis('Çatı Özel')">Sipariş</button></div>
    </div>
    <div class="kategori">
        <h3>☕ İçecekler</h3>
        <div class="urun"><span>Çay</span> <button onclick="siparis('Çay')">Sipariş</button></div>
        <div class="urun"><span>Türk Kahvesi</span> <button onclick="siparis('Türk Kahvesi')">Sipariş</button></div>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://cati-cafe-menu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        function siparis(urun) {
            const masa = prompt("Masa No:");
            if(masa) {
                firebase.database().ref('siparisler').push({ masa: masa, urun: urun, saat: new Date().toLocaleTimeString() });
                alert("Sipariş Gitti!");
            }
        }
    </script>
</body>
</html>
